worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=otp:10m rate=3r/m;
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  # Upstream servers
  upstream backend_servers {
    least_conn;
    server backend:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream frontend_servers {
    server frontend:3000;
    keepalive 16;
  }

  # Security headers map
  map $sent_http_content_type $cache_control {
    default "no-cache";
    ~image/ "public, max-age=31536000, immutable";
    text/css "public, max-age=31536000, immutable";
    application/javascript "public, max-age=31536000, immutable";
  }

  server {
    listen 80;
    server_name flirtigo.in www.flirtigo.in;

    # Redirect HTTP to HTTPS in production
    # return 301 https://$server_name$request_uri;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-src https://checkout.razorpay.com https://accounts.google.com;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    limit_conn addr 20;
    client_max_body_size 5m;

    # API Routes
    location /api {
      limit_req zone=api burst=20 nodelay;

      proxy_pass http://backend_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 90;
      proxy_connect_timeout 90;
    }

    # Auth routes (stricter rate limiting)
    location /auth {
      limit_req zone=auth burst=5 nodelay;

      proxy_pass http://backend_servers;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OTP endpoint (very strict)
    location /api/otp {
      limit_req zone=otp burst=2 nodelay;
      proxy_pass http://backend_servers;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Socket.io
    location /socket.io {
      proxy_pass http://backend_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }

    # Frontend
    location / {
      proxy_pass http://frontend_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # HTTPS server (enable in production)
  # server {
  #   listen 443 ssl http2;
  #   server_name flirtigo.in www.flirtigo.in;
  #   ssl_certificate /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #   ssl_session_cache shared:SSL:10m;
  #   ssl_session_timeout 10m;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers HIGH:!aNULL:!MD5;
  #   ssl_prefer_server_ciphers on;
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  #   ... (same location blocks as above)
  # }
}
